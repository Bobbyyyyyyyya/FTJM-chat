name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: macos-latest
            artifact: |
              *.dmg
              *.zip
            name: macOS
          - os: windows-latest
            artifact: |
              *.exe
            name: Windows
          - os: ubuntu-latest
            artifact: |
              *.AppImage
              *.deb
            name: Linux

    steps:
      - uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Install dependencies
        run: pnpm install

      - name: Setup env files
        shell: bash
        run: cp .env.example .env.local

      - name: Install Linux build tools
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y dpkg fakeroot

      - name: Build
        run: pnpm build

      - name: Import macOS signing cert
        if: matrix.os == 'macos-latest'
        run: |
          if [ -n "$CSC_LINK" ]; then
            echo "$CSC_LINK" | base64 --decode > /tmp/cert.p12
            security create-keychain -p temp temp.keychain
            security default-keychain -s temp.keychain
            security unlock-keychain -p temp temp.keychain
            security import /tmp/cert.p12 -k temp.keychain -P "$CSC_KEY_PASSWORD" -T /usr/bin/codesign
            security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k temp temp.keychain
          else
            echo "No CSC_LINK secret set, skipping signing cert import"
          fi
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}

      - name: Package
        shell: bash
        run: cd packages/main && npx electron-builder --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: List built artifacts
        shell: bash
        run: ls -la packages/main/release/

      - name: Upload Release Assets
        uses: softprops/action-gh-release@v3
        with:
          files: |
            packages/main/release/${{ matrix.artifact }}
            packages/main/release/*.blockmap
            packages/main/release/latest*.yml
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
