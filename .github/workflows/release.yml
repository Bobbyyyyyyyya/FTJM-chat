name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: macos-latest
            artifact: '*.dmg'
            name: macOS
          - os: windows-latest
            artifact: '*.exe'
            name: Windows
          - os: ubuntu-latest
            artifact: '*.AppImage'
            name: Linux

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install

      - name: Build
        run: pnpm build

      - name: Import macOS signing cert
        if: matrix.os == 'macos-latest'
        run: |
          if [ -n "$CSC_LINK" ]; then
            echo "$CSC_LINK" | base64 --decode > /tmp/cert.p12
            security create-keychain -p temp temp.keychain
            security default-keychain -s temp.keychain
            security unlock-keychain -p temp temp.keychain
            security import /tmp/cert.p12 -k temp.keychain -P "$CSC_KEY_PASSWORD" -T /usr/bin/codesign
            security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k temp temp.keychain
          else
            echo "No CSC_LINK secret set, skipping signing cert import"
          fi
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}

      - name: Pack app (unpacked)
        if: matrix.os == 'macos-latest'
        run: cd packages/main && npx electron-builder --dir --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}

      - name: Ad-hoc sign macOS app
        if: matrix.os == 'macos-latest'
        run: |
          APP_PATH=$(find packages/main/release -name "FTJM Chat.app" -type d)
          echo "Signing: $APP_PATH"
          codesign --force --deep -s - "$APP_PATH"
          codesign --verify --verbose=4 "$APP_PATH"

      - name: Package DMG/ZIP
        if: matrix.os == 'macos-latest'
        run: |
          APP_PATH=$(find packages/main/release -name "FTJM Chat.app" -type d)
          cd packages/main && npx electron-builder --prepackaged "$APP_PATH" --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Package (Windows / Linux)
        if: matrix.os != 'macos-latest'
        run: cd packages/main && npx electron-builder --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Release Assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            packages/main/release/*.dmg
            packages/main/release/*.exe
            packages/main/release/*.AppImage
            packages/main/release/*.zip
            packages/main/release/*.blockmap
            packages/main/release/latest*.yml
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
