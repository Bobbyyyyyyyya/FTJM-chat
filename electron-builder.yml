{
  "name": "ftjm-chat",
  "version": "0.1.0",
  "appId": "com.ftjm.chat",
  "productName": "FTJM Chat",
  "directories": {
    "buildResources": "assets"
  },
  "files": [
    "dist/**/*",
    "node_modules/**/*"
  ],
  "mac": {
    "target": ["dmg", "zip"],
    "category": "public.app-category.productivity"
  },
  "win": {
    "target": ["nsis", "portable"]
  },
  "linux": {
    "target": ["AppImage", "deb"]
  },
  "nsis": {
    "oneClick": false,
    "allowToChangeInstallationDirectory": true
  },
  "publish": {
    "provider": "github",
    "owner": "your-username",
    "repo": "ftjm-chat"
  }
}
