appId: com.ftjm.chat
productName: FTJM Chat

directories:
  buildResources: assets
  output: release
extraResources:
  - from: web-dist
    to: web-dist
    filter:
      - "**/*"
afterPack: scripts/afterPack.cjs
mac:
  identity: null
  target:
    - dmg
    - zip
  category: public.app-category.productivity
  artifactName: "FTJM-Chat-${version}-${arch}.${ext}"
win:
  target:
    - nsis
    - portable
linux:
  target:
    - AppImage
    - deb
  category: Utility
  maintainer: "FTJM Team <team@ftjm.chat>"
  artifactName: "FTJM-Chat_${version}_${arch}.${ext}"
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
publish:
  provider: github
  owner: Bobbyyyyyyyya
  repo: FTJM-chat
