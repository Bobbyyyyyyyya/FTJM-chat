appId: com.ftjm.chat
productName: FTJM Chat
directories:
  buildResources: assets
  output: dist
files:
  - dist/**/*
  - node_modules/**/*
extraResources:
  - from: web-dist
    to: web-dist
    filter:
      - "**/*"
mac:
  target:
    - dmg
    - zip
  category: public.app-category.productivity
win:
  target:
    - nsis
    - portable
linux:
  target:
    - AppImage
    - deb
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
publish:
  provider: github
  owner: your-username
  repo: ftjm-chat
