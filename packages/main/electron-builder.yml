appId: com.ftjm.chat
productName: FTJM Chat

directories:
  buildResources: assets
  output: release
files:
  - dist/**/*
extraResources:
  - from: web-dist
    to: web-dist
    filter:
      - "**/*"
mac:
  target:
    - dmg
    - zip
  category: public.app-category.productivity
win:
  target:
    - nsis
    - portable
linux:
  target:
    - AppImage
    - deb
  category: Utility
  maintainer: "FTJM Team <team@ftjm.chat>"
  artifactName: "${productName}_${version}_${arch}.${ext}"
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
publish:
  provider: github
  owner: Bobbyyyyyyyya
  repo: FTJM-chat
