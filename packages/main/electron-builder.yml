appId: com.ftjm.chat
productName: FTJM Chat

directories:
  buildResources: assets
  output: release
extraResources:
  - from: web-dist
    to: web-dist
    filter:
      - "**/*"
afterPack: scripts/afterPack.cjs
icon: assets/icon.png

mac:
  target:
    - dmg
    - zip
  category: public.app-category.productivity
  artifactName: "FTJM-Chat-${version}-${arch}.${ext}"
  icon: assets/icon.icns
win:
  target:
    - nsis
    - portable
  icon: assets/icon.ico
linux:
  target:
    - target: AppImage
      arch: [x64]
    - target: deb
      arch: [x64]
  category: Utility
  maintainer: "FTJM Team <team@ftjm.chat>"
  artifactName: "FTJM-Chat_${version}_${arch}.${ext}"
  icon: assets/icon.png
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
publish:
  provider: github
  owner: Bobbyyyyyyyya
  repo: FTJM-chat
